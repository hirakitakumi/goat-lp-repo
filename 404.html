<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#0a0c10"/>
<title>404 ／ Page Not Found ｜ GOAT KICKBOXING FES.2</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #050608;
    color: #fff;
    font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .container {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 8px;
    background: #e8c876; color: #1b1408;
    font-family: "Bebas Neue", "Anton", Impact, sans-serif;
    font-weight: 900; font-size: 44px;
    margin-bottom: 32px;
  }
  .code {
    font-family: "Bebas Neue", "Anton", Impact, sans-serif;
    font-size: clamp(64px, 12vw, 128px);
    line-height: 1;
    letter-spacing: -.02em;
    color: #fff;
    margin-bottom: 16px;
  }
  .label {
    font-family: "Bebas Neue", "Anton", Impact, sans-serif;
    font-size: 14px;
    letter-spacing: .24em;
    color: rgba(232,200,118, 1);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .title {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 800;
    letter-spacing: .04em;
    margin-bottom: 16px;
  }
  .desc {
    font-size: 14px;
    color: rgba(255,255,255,.7);
    max-width: 480px;
    margin: 0 auto 40px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px;
    background: #d3262a;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: .06em;
    border-radius: 3px;
    transition: transform .2s ease, background .2s ease;
  }
  .btn:hover { background: #b81e22; transform: translateY(-1px); }
</style>
</head>
<body>
<div class="container">
  <div class="mark">G</div>
  <div class="label">ERROR</div>
  <div class="code">404</div>
  <h1 class="title">ページが見つかりません</h1>
  <p class="desc">
    お探しのページは移動・削除されたか、URLが間違っている可能性があります。<br/>
    お手数ですが、トップページからもう一度お探しください。
  </p>
  <a href="/" class="btn">トップページへ戻る →</a>
</div>
</body>
</html>
